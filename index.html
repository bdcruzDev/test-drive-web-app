<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Vial Pro 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            
            <div id="welcome-screen" class="card-custom p-5 fade-in">
                <h1 class="text-center mb-4">Evaluación Vial Nicaragua</h1>
                <div class="mb-4">
                    <label class="form-label">Nombre del Aspirante</label>
                    <input type="text" id="user-name" class="form-control form-control-lg" placeholder="Ej. Juan Pérez">
                </div>
                <div class="mb-4">
                    <label class="form-label">Cantidad de preguntas</label>
                    <input type="number" id="q-count" class="form-control" value="10" min="5">
                </div>
                <button class="btn btn-primary btn-modern w-100" onclick="initApp()">Comenzar Prueba</button>

                <hr class="my-5">
                <h5>Historial Reciente</h5>
                <div id="history-list"></div>
            </div>

            <div id="quiz-screen" class="card-custom p-4 hidden fade-in">
                <div class="progress mb-4" style="height: 8px;">
                    <div id="progress-bar" class="progress-bar bg-primary" role="progressbar"></div>
                </div>
                <h3 id="question-text" class="mb-4">Cargando pregunta...</h3>
                <div id="options-container"></div>
            </div>

            <div id="result-screen" class="card-custom p-5 text-center hidden fade-in">
                <h2>Resultado para el Aspirante</h2>
                <div id="score-display" class="display-2 my-4 fw-bold">0</div>
                <div id="status-text" class="h3"></div>
                <button class="btn btn-outline-primary btn-modern mt-4" onclick="location.reload()">Nuevo Intento</button>
            </div>

        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
