<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NicaDrive - Examen de Conducción Nicaragua</title>
    <meta name="description" content="Prepárate para tu examen de conducir en Nicaragua con NicaDrive. Aprende sobre la Ley 431, señalizaciones y multas con un estilo divertido y moderno.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="dark-theme">
    <div id="app" class="app-container">
        <button id="sound-toggle" class="sound-toggle" title="Alternar Sonido">🔊</button>
        <!-- Main Menu -->
        <section id="menu-screen" class="screen active">
            <div class="hero-section">
                <div class="logo-container">
                    <div class="logo-icon">🚗</div>
                    <h1>Nica<span>Drive</span></h1>
                </div>
                <p class="subtitle">Domina la Ley 431 y obtén tu licencia de conducir en Nicaragua.</p>
                <div class="session-selector">
                    <p class="selector-label">¿Cuántas preguntas quieres hoy?</p>
                    <div class="size-chips">
                        <button class="chip active" data-size="10">10</button>
                        <button class="chip" data-size="20">20</button>
                        <button class="chip" data-size="30">30</button>
                        <button class="chip" data-size="82">Todas</button>
                    </div>
                </div>
                <button id="start-btn" class="btn btn-primary btn-large">¡EMPEZAR AHORA!</button>
                <button id="study-btn" class="btn btn-secondary btn-large" style="margin-top: 15px;">MODO ESTUDIO</button>
                
                <div id="history-section" class="history-section hidden">
                    <h3>Tu Historial</h3>
                    <div id="history-list" class="history-list">
                        <!-- History items will be injected here -->
                    </div>
                    <button id="clear-history-btn" class="btn-text">Borrar historial</button>
                </div>
            </div>
        </section>

        <!-- Quiz Screen -->
        <section id="quiz-screen" class="screen">
            <header class="quiz-header">
                <button id="close-quiz" class="btn-icon">✕</button>
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar" style="width: 0%;"></div>
                </div>
                <span id="question-counter" class="question-counter">1 / 10</span>
                <div id="mistakes-container" class="mistakes-container">
                    <span class="mistake-icon">❌</span>
                    <span id="mistakes-count">0</span>
                </div>
            </header>

            <main class="quiz-main">
                <div id="question-container">
                    <!-- Questions will be injected here -->
                </div>
            </main>

            <footer class="quiz-footer">
                <div id="feedback-message" class="feedback-container hidden">
                    <div class="feedback-content">
                        <div class="feedback-icon"></div>
                        <div class="feedback-text">
                            <h3 id="feedback-title"></h3>
                            <p id="feedback-desc"></p>
                            <p id="feedback-source" class="feedback-source"></p>
                        </div>
                    </div>
                    <button id="next-btn" class="btn btn-success">CONTINUAR</button>
                </div>
                <div id="action-container" class="action-container">
                    <button id="check-btn" class="btn btn-disabled" disabled>COMPROBAR</button>
                </div>
            </footer>
        </section>

        <!-- Results Screen -->
        <section id="results-screen" class="screen">
            <div class="results-content">
                <div class="results-graphic" id="results-icon">🏆</div>
                <h2 id="results-status">¡Lección Completada!</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-label">Puntaje</span>
                        <span id="final-score" class="stat-value">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Precisión</span>
                        <span id="accuracy" class="stat-value">0%</span>
                    </div>
                </div>
                <button id="retry-btn" class="btn btn-secondary">VOLVER AL INICIO</button>
            </div>
        </section>

        <!-- Study Screen -->
        <section id="study-screen" class="screen">
            <header class="quiz-header study-header">
                <button id="close-study" class="btn-icon">✕</button>
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="study-search" placeholder="Buscar por tema o palabra clave...">
                </div>
            </header>
            <main class="study-main" style="flex: 1; overflow-y: auto; padding-top: 20px;">
                <div id="study-list" class="study-list">
                    <!-- Study cards will be injected here -->
                </div>
            </main>
        </section>
    </div>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
